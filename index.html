<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON//SHELL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen-noise" aria-hidden="true"></div>
  <div class="grid" aria-hidden="true"></div>

  <main class="shell" aria-label="Demo terminal application">
    <header class="shell__header">
      <div>
        <p class="eyebrow">STATIC DEMO NODE</p>
        <h1>NEON//SHELL</h1>
      </div>
      <div class="status">
        <span>LINK: STABLE</span>
        <span>MODE: DEMO</span>
        <span id="clock">--:--:--</span>
      </div>
    </header>

    <section class="hero">
      <p class="hero__lead">A single-page interface designed like a late-night terminal with a little synthwave spillover.</p>
      <div class="hero__chips">
        <span>CLI NAVIGATION</span>
        <span>STATIC FILES</span>
        <span>RETRO CRT</span>
      </div>
    </section>

    <section class="terminal" aria-label="Interactive command line">
      <div class="terminal__output" id="output" role="log" aria-live="polite"></div>
      <form class="prompt" id="prompt-form" autocomplete="off">
        <label class="prompt__label" for="command-input">guest@neon-shell:~$</label>
        <input
          id="command-input"
          class="prompt__input"
          name="command"
          type="text"
          spellcheck="false"
          autocapitalize="off"
          autofocus
          aria-label="Command input"
        >
      </form>
    </section>

    <footer class="legend">
      <p>Try: <button data-command="help">help</button> <button data-command="about">about</button> <button data-command="projects">projects</button> <button data-command="system">system</button> <button data-command="contact">contact</button> <button data-command="clear">clear</button></p>
    </footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
