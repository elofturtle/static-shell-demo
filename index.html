<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>NEON//SHELL</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>
  <div class="screen-noise" aria-hidden="true"></div>
  <div class="grid" aria-hidden="true"></div>

  <main class="shell" aria-label="Demo terminal application">
    <header class="shell__header">
      <div>
        <h1>STATIC//SHELL</h1>
      </div>
      <div class="status">
        <span>LINK: STABLE</span>
        <span>MODE: DEMO</span>
        <span id="clock">--:--:--</span>
      </div>
    </header>

    <section class="terminal" aria-label="Interactive command line">
      <div class="terminal__output" id="output" role="log" aria-live="polite"></div>
      <form class="prompt" id="prompt-form" autocomplete="off">
        <label class="prompt__label" for="command-input">guest@neon-shell:~$</label>
        <input
          id="command-input"
          class="prompt__input"
          name="command"
          type="text"
          spellcheck="false"
          autocapitalize="off"
          autofocus
          aria-label="Command input"
        >
      </form>
    </section>
  </main>
  <script src="app.js"></script>
</body>
</html>
